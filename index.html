<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مختبر الأمن السيبراني الافتراضي</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.75)),
url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b');
background-size:cover;
background-position:center;
height:100vh;
overflow:hidden;
color:white;
}

.navbar{
position:fixed;
top:0;
width:100%;
height:70px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
background:rgba(0,15,35,.75);
backdrop-filter:blur(12px);
border-bottom:1px solid #00ffff;
z-index:1000;
}

.nav-btn{
padding:10px 18px;
background:rgba(0,255,255,.08);
border:1px solid #00ffff;
color:white;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.nav-btn:hover{
background:rgba(0,255,255,.25);
box-shadow:0 0 15px #00ffff;
}

.main{
padding-top:100px;
height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
}

.panel{
width:90%;
max-width:1100px;
height:75vh;
background:rgba(0,20,40,.55);
backdrop-filter:blur(12px);
border:1px solid #00ffff;
border-radius:20px;
padding:30px;
overflow-y:auto;
box-shadow:0 0 25px rgba(0,255,255,.3);
}

h1{
color:#00ffff;
margin-bottom:20px;
}

h2{
margin-top:20px;
color:#7df9ff;
}

.module{
background:rgba(255,255,255,.05);
padding:15px;
margin:15px 0;
border-right:4px solid #00ffff;
border-radius:10px;
}

.contact-box{
line-height:2;
font-size:18px;
}

.video{
margin-top:20px;
text-align:center;
}

iframe{
max-width:100%;
border:none;
border-radius:12px;
}

</style>
</head>

<body>

<div class="navbar">

<button class="nav-btn" onclick="showPage('home')">🏠 الرئيسية</button>

<button class="nav-btn" onclick="showPage('goals')">🎯 الأهداف</button>

<button class="nav-btn" onclick="showPage('content')">📚 المحتوى التدريبي</button>

<button class="nav-btn" onclick="showPage('instructions')">📋 التعليمات</button>

<button class="nav-btn" onclick="showPage('help')">🆘 المساعدة</button>

<button class="nav-btn" onclick="showPage('contact')">📞 اتصل بنا</button>

</div>

<div class="main">
<div class="panel" id="contentArea"></div>
</div>

<script>

const pages = {

home: `
<h1>🛡️ مرحباً بكم في مختبر الأمن السيبراني الافتراضي</h1>

<p>
أهلاً بكم في بيئة تدريبية تفاعلية ثلاثية الأبعاد تهدف إلى تطوير مهارات المعلمين
في الأمن السيبراني من خلال محاكاة واقعية للهجمات الإلكترونية.
</p>

<br>

<h2>ماذا ستتعلم؟</h2>

<ul>
<li>التعرف على التهديدات السيبرانية.</li>
<li>حماية الحسابات والبيانات.</li>
<li>اكتشاف البرمجيات الخبيثة.</li>
<li>الاستجابة للحوادث الأمنية.</li>
<li>تعزيز الوعي الرقمي.</li>
</ul>
`,

goals: `
<h1>🎯 أهداف البيئة التدريبية</h1>

<h2>الأهداف المعرفية</h2>
<ul>
<li>فهم مفاهيم الأمن السيبراني.</li>
<li>معرفة أنواع الهجمات الإلكترونية.</li>
<li>التعرف على أساليب الحماية.</li>
</ul>

<h2>الأهداف المهارية</h2>
<ul>
<li>تحليل التهديدات السيبرانية.</li>
<li>كشف الرسائل المشبوهة.</li>
<li>تطبيق إجراءات الحماية.</li>
</ul>

<h2>الأهداف الوجدانية</h2>
<ul>
<li>تعزيز المسؤولية الرقمية.</li>
<li>بناء ثقافة أمنية إيجابية.</li>
</ul>
`,

content: `
<h1>📚 المحتوى التدريبي</h1>

<div class="module">
<h2>الموديول الأول</h2>
مقدمة في الأمن السيبراني.
</div>

<div class="module">
<h2>الموديول الثاني</h2>
التصيد الاحتيالي والهندسة الاجتماعية.
</div>

<div class="module">
<h2>الموديول الثالث</h2>
البرمجيات الخبيثة.
</div>

<div class="module">
<h2>الموديول الرابع</h2>
حماية الحسابات وكلمات المرور.
</div>

<div class="module">
<h2>الموديول الخامس</h2>
الاستجابة للحوادث السيبرانية.
</div>
`,

instructions: `
<h1>📋 تعليمات الاستخدام</h1>

<ol>
<li>ابدأ بقراءة الأهداف التدريبية.</li>
<li>انتقل إلى الموديولات بالترتيب.</li>
<li>نفذ الأنشطة التفاعلية.</li>
<li>شاهد الفيديو التوضيحي عند الحاجة.</li>
<li>تواصل مع الدعم الفني إذا واجهتك مشكلة.</li>
</ol>
`,

help: `
<h1>🆘 المساعدة</h1>

<p>
شاهد الفيديو التالي للتعرف على طريقة استخدام البيئة التدريبية.
</p>

<div class="video">

<iframe width="700" height="400"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
allowfullscreen>
</iframe>

</div>
`,

contact: `
<h1>📞 اتصل بنا</h1>

<div class="contact-box">

📧 البريد الإلكتروني:
<br>
cyberlab@training.edu

<br><br>

📱 الهاتف:
<br>
+20 100 000 0000

<br><br>

🌐 الموقع الإلكتروني:
<br>
www.cyberlab.edu

<br><br>

📍 العنوان:
<br>
مركز التدريب الرقمي للأمن السيبراني - مصر

</div>
`
};

function showPage(page){
document.getElementById("contentArea").innerHTML = pages[page];
}

showPage('home');

</script>

</body>
</html>
